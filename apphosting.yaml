# Settings for Firebase App Hosting

# Check the documentation for more details:
# https://firebase.google.com/docs/app-hosting/configure

runConfig:
  runtime: nodejs22
  cpu: 2
  memoryMiB: 2048
  minInstances: 0
  maxInstances: 10
  timeoutSeconds: 300
  concurrency: 80

env:
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: "hayaoshi-aef9c"
  - variable: FIREBASE_ADMIN_CLIENT_EMAIL
    secret: FIREBASE_ADMIN_CLIENT_EMAIL
  - variable: FIREBASE_ADMIN_PRIVATE_KEY
    secret: FIREBASE_ADMIN_PRIVATE_KEY
  - variable: ADMIN_UIDS
    secret: ADMIN_UIDS
  - variable: GEMINI_API_KEY
    secret: GEMINI_API_KEY
  - variable: CLOUDINARY_CLOUD_NAME
    secret: CLOUDINARY_CLOUD_NAME
  - variable: CLOUDINARY_API_KEY
    secret: CLOUDINARY_API_KEY
  - variable: CLOUDINARY_API_SECRET
    secret: CLOUDINARY_API_SECRET
  - variable: INSTAGRAM_BUSINESS_ACCOUNT_ID
    secret: INSTAGRAM_BUSINESS_ACCOUNT_ID
  - variable: INSTAGRAM_ACCESS_TOKEN
    secret: INSTAGRAM_ACCESS_TOKEN
  - variable: THREADS_USER_ID
    secret: THREADS_USER_ID
  - variable: THREADS_ACCESS_TOKEN
    secret: THREADS_ACCESS_TOKEN
  - variable: CRON_SECRET
    secret: CRON_SECRET
  - variable: STRIPE_SECRET_KEY
    secret: STRIPE_SECRET_KEY
  - variable: STRIPE_WEBHOOK_SECRET
    secret: STRIPE_WEBHOOK_SECRET
  - variable: STRIPE_SAAS_CASE_DB_BETA_PRICE_ID
    value: "price_1TUe2U0MQKwsAMDfkqkBItcn"
  - variable: NEXT_PUBLIC_SITE_URL
    value: "https://sparks-station.com"
  - variable: NEXT_PUBLIC_CONTACT_EMAIL
    value: "sparks.station.contact@gmail.com"
  - variable: SAAS_CASE_DB_CHECKOUT_ENABLED
    value: "false"
  - variable: NEXT_PUBLIC_SAAS_CASE_DB_CHECKOUT_ENABLED
    value: "false"
  - variable: REEL_BGM_URL
    value: "https://res.cloudinary.com/dxexypvx6/video/upload/v1777169940/Morning_in_Minato_sgnp7f.mp3"
